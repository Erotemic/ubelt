name: PurePyCI

on:
  push:
  pull_request:
    branches: [ main ]

jobs:
  lint_job:
    ##
    # Run quick linting and typing checks.
    # To disable all linting add "linter=false" to the xcookie config.
    # To disable type checks add "notypes" to the xcookie tags.
    ##
    runs-on: ubuntu-latest
    steps:
    - name: Checkout source
      uses: actions/checkout@v6.0.2
    - name: Set up Python 3.14 for linting
      uses: actions/setup-python@v5.6.0
      with:
        python-version: '3.14'
    - name: Install dependencies
      run: |-
        python -m pip install pip uv -U
        python -m uv pip install flake8
    - name: Lint with flake8
      run: |-
        # stop the build if there are Python syntax errors or undefined names
        flake8 ./ubelt --count --select=E9,F63,F7,F82 --show-source --statistics
    - name: Typecheck
      run: |-
        python -m pip install ty
        pip install -r requirements/runtime.txt
        ty check ./ubelt
  build_and_test_sdist:
    ##
    # Build the pure python package from source and test it in the
    # same environment.
    ##
    name: Build sdist
    runs-on: ubuntu-latest
    steps:
    - name: Checkout source
      uses: actions/checkout@v6.0.2
    - name: Set up Python 3.14
      uses: actions/setup-python@v5.6.0
      with:
        python-version: '3.14'
    - name: Upgrade pip
      run: |-
        python -m pip install pip uv -U
        python -m pip install --prefer-binary -r requirements/tests.txt
        python -m pip install --prefer-binary -r requirements/runtime.txt
    - name: Build sdist
      shell: bash
      run: |-
        python -m pip install pip uv -U
        python -m uv pip install setuptools>=0.8 wheel build twine
        python -m build --sdist --outdir wheelhouse
        python -m twine check ./wheelhouse/ubelt*.tar.gz
    - name: Install sdist
      run: |-
        ls -al wheelhouse
        python -m pip install --prefer-binary wheelhouse/ubelt*.tar.gz -v
    - name: Test minimal loose sdist
      env: {}
      run: |-
        pwd
        ls -al
        # Run in a sandboxed directory
        WORKSPACE_DNAME="testsrcdir_minimal_${CI_PYTHON_VERSION}_${GITHUB_RUN_ID}_${RUNNER_OS}"
        mkdir -p $WORKSPACE_DNAME
        cd $WORKSPACE_DNAME
        # Run the tests
        # Get path to installed package
        MOD_DPATH=$(python -c "import ubelt, os; print(os.path.dirname(ubelt.__file__))")
        echo "MOD_DPATH = $MOD_DPATH"
        python -m pytest --verbose --cov=ubelt $MOD_DPATH ../tests
        cd ..
    - name: Test full loose sdist
      env: {}
      run: |-
        pwd
        ls -al
        true
        # Run in a sandboxed directory
        WORKSPACE_DNAME="testsrcdir_full_${CI_PYTHON_VERSION}_${GITHUB_RUN_ID}_${RUNNER_OS}"
        mkdir -p $WORKSPACE_DNAME
        cd $WORKSPACE_DNAME
        # Run the tests
        # Get path to installed package
        MOD_DPATH=$(python -c "import ubelt, os; print(os.path.dirname(ubelt.__file__))")
        echo "MOD_DPATH = $MOD_DPATH"
        python -m pytest --verbose --cov=ubelt $MOD_DPATH ../tests
        cd ..
    - uses: actions/upload-artifact@v6.0.0
      name: Upload sdist artifact
      with:
        name: sdist_wheels
        path: ./wheelhouse/ubelt*.tar.gz
  build_purepy_wheels:
    ##
    # Build the pure-python wheels independently on a per-platform basis.
    # These will be tested later in the test_purepy_wheels step.
    ##
    name: ${{ matrix.python-version }} on ${{ matrix.os }}, arch=${{ matrix.arch }} with ${{ matrix.install-extras }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
        - ubuntu-latest
        python-version:
        - '3.14'
        arch:
        - auto
    steps:
    - name: Checkout source
      uses: actions/checkout@v6.0.2
    - name: Set up QEMU
      uses: docker/setup-qemu-action@v3.7.0
      if: runner.os == 'Linux' && matrix.arch != 'auto'
      with:
        platforms: all
    - name: Setup Python
      uses: actions/setup-python@v5.6.0
      with:
        python-version: ${{ matrix.python-version }}
    - name: Build pure wheel
      shell: bash
      run: |-
        python -m pip install pip uv -U
        python -m uv pip install setuptools>=0.8 wheel build twine
        python -m build --wheel --outdir wheelhouse
        python -m twine check ./wheelhouse/ubelt*.whl
    - name: Show built files
      shell: bash
      run: ls -la wheelhouse
    - uses: actions/upload-artifact@v6.0.0
      name: Upload wheels artifact
      with:
        name: wheels-${{ matrix.os }}-${{ matrix.arch }}
        path: ./wheelhouse/ubelt*.whl
  test_purepy_wheels:
    ##
    # Download and test the pure-python wheels that were built in the
    # build_purepy_wheels step in this independent environment.
    ##
    name: ${{ matrix.python-version }} on ${{ matrix.os }}, arch=${{ matrix.arch }} with ${{ matrix.install-extras }}
    if: "! startsWith(github.event.ref, 'refs/heads/release')"
    runs-on: ${{ matrix.os }}
    needs:
    - build_purepy_wheels
    strategy:
      fail-fast: false
      matrix:
        # Xcookie generates an explicit list of environments that will be used
        # for testing instead of using the more concise matrix notation.
        include:
        - python-version: '3.8'
          install-extras: tests-strict,runtime-strict
          os: ubuntu-latest
          arch: auto
        - python-version: '3.8'
          install-extras: tests-strict,runtime-strict
          os: macOS-latest
          arch: auto
        - python-version: '3.8'
          install-extras: tests-strict,runtime-strict
          os: windows-latest
          arch: auto
        - python-version: '3.14'
          install-extras: tests-strict,runtime-strict,optional-strict
          os: ubuntu-latest
          arch: auto
        - python-version: '3.14'
          install-extras: tests-strict,runtime-strict,optional-strict
          os: macOS-latest
          arch: auto
        - python-version: '3.14'
          install-extras: tests-strict,runtime-strict,optional-strict
          os: windows-latest
          arch: auto
        - python-version: '3.14'
          install-extras: tests
          os: macOS-latest
          arch: auto
        - python-version: '3.14'
          install-extras: tests
          os: windows-latest
          arch: auto
        - python-version: '3.8'
          install-extras: tests,optional
          os: ubuntu-latest
          arch: auto
        - python-version: '3.9'
          install-extras: tests,optional
          os: ubuntu-latest
          arch: auto
        - python-version: '3.10'
          install-extras: tests,optional
          os: ubuntu-latest
          arch: auto
        - python-version: '3.11'
          install-extras: tests,optional
          os: ubuntu-latest
          arch: auto
        - python-version: '3.12'
          install-extras: tests,optional
          os: ubuntu-latest
          arch: auto
        - python-version: '3.13'
          install-extras: tests,optional
          os: ubuntu-latest
          arch: auto
        - python-version: '3.14'
          install-extras: tests,optional
          os: ubuntu-latest
          arch: auto
        - python-version: pypy-3.9
          install-extras: tests,optional
          os: ubuntu-latest
          arch: auto
        - python-version: '3.8'
          install-extras: tests,optional
          os: macOS-latest
          arch: auto
        - python-version: '3.9'
          install-extras: tests,optional
          os: macOS-latest
          arch: auto
        - python-version: '3.10'
          install-extras: tests,optional
          os: macOS-latest
          arch: auto
        - python-version: '3.11'
          install-extras: tests,optional
          os: macOS-latest
          arch: auto
        - python-version: '3.12'
          install-extras: tests,optional
          os: macOS-latest
          arch: auto
        - python-version: '3.13'
          install-extras: tests,optional
          os: macOS-latest
          arch: auto
        - python-version: '3.14'
          install-extras: tests,optional
          os: macOS-latest
          arch: auto
        - python-version: pypy-3.9
          install-extras: tests,optional
          os: macOS-latest
          arch: auto
        - python-version: '3.8'
          install-extras: tests,optional
          os: windows-latest
          arch: auto
        - python-version: '3.9'
          install-extras: tests,optional
          os: windows-latest
          arch: auto
        - python-version: '3.10'
          install-extras: tests,optional
          os: windows-latest
          arch: auto
        - python-version: '3.11'
          install-extras: tests,optional
          os: windows-latest
          arch: auto
        - python-version: '3.12'
          install-extras: tests,optional
          os: windows-latest
          arch: auto
        - python-version: '3.13'
          install-extras: tests,optional
          os: windows-latest
          arch: auto
        - python-version: '3.14'
          install-extras: tests,optional
          os: windows-latest
          arch: auto
        - python-version: pypy-3.9
          install-extras: tests,optional
          os: windows-latest
          arch: auto
    steps:
    - name: Checkout source
      uses: actions/checkout@v6.0.2
    - name: Enable MSVC 64bit
      uses: ilammy/msvc-dev-cmd@v1
      if: ${{ startsWith(matrix.os, 'windows-') }}
      with:
        arch: ${{ contains(matrix.os, 'arm') && 'arm64' || 'x64' }}
    - name: Set up QEMU
      uses: docker/setup-qemu-action@v3.7.0
      if: runner.os == 'Linux' && matrix.arch != 'auto'
      with:
        platforms: all
    - name: Setup Python
      uses: actions/setup-python@v5.6.0
      with:
        python-version: ${{ matrix.python-version }}
    - uses: actions/download-artifact@v4.1.8
      name: Download wheels
      with:
        pattern: wheels-*
        merge-multiple: true
        path: wheelhouse
    - name: Set macOS deployment target (arm64)
      if: runner.os == 'macOS'
      run: echo "MACOSX_DEPLOYMENT_TARGET=11.0" >> $GITHUB_ENV
    - name: Install wheel ${{ matrix.install-extras }}
      shell: bash
      env:
        INSTALL_EXTRAS: ${{ matrix.install-extras }}
      run: |-
        echo "Finding the path to the wheel"
        ls wheelhouse || echo "wheelhouse does not exist"
        echo "Installing helpers: update pip"
        python -m pip install pip uv -U
        echo "Installing helpers: setuptools"
        python -m uv pip install setuptools>=0.8 setuptools_scm wheel build -U
        echo "Installing helpers: tomli and pkginfo"
        python -m uv pip install tomli pkginfo packaging
        export WHEEL_FPATH=$(python -c "if 1:
            import pathlib
            from packaging import tags
            from packaging.utils import parse_wheel_filename
            dist_dpath = pathlib.Path('wheelhouse')
            wheels = sorted(dist_dpath.glob('ubelt*.whl'))
            if wheels:
                sys_tags = set(tags.sys_tags())
                matching = []
                for w in wheels:
                    try:
                        _, _, _, wheel_tags = parse_wheel_filename(w.name)
                    except Exception:
                        continue
                    if any(t in sys_tags for t in wheel_tags):
                        matching.append(w)
                fpath = sorted(matching or wheels)[-1]
            else:
                sdists = sorted(dist_dpath.glob('ubelt*.tar.gz'))
                if not sdists:
                    raise SystemExit('No wheel artifacts found in wheelhouse')
                fpath = sdists[-1]
            print(str(fpath).replace(chr(92), chr(47)))
        ")
        echo "WHEEL_FPATH=$WHEEL_FPATH"
        echo "INSTALL_EXTRAS=$INSTALL_EXTRAS"
        echo "UV_RESOLUTION=$UV_RESOLUTION"
        python -m pip install --prefer-binary "${WHEEL_FPATH}[${INSTALL_EXTRAS}]"
        echo "Install finished."
    - name: Test wheel ${{ matrix.install-extras }}
      shell: bash
      env:
        CI_PYTHON_VERSION: py${{ matrix.python-version }}
      run: |-
        echo "Creating test sandbox directory"
        export WORKSPACE_DNAME="testdir_${CI_PYTHON_VERSION}_${GITHUB_RUN_ID}_${RUNNER_OS}"
        echo "WORKSPACE_DNAME=$WORKSPACE_DNAME"
        mkdir -p $WORKSPACE_DNAME
        echo "cd-ing into the workspace"
        cd $WORKSPACE_DNAME
        pwd
        ls -altr
        # Get the path to the installed package and run the tests
        export MOD_DPATH=$(python -c "import ubelt, os; print(os.path.dirname(ubelt.__file__))")
        export MOD_NAME=ubelt
        echo "
        ---
        MOD_DPATH = $MOD_DPATH
        ---
        running the pytest command inside the workspace
        ---
        "
        python -m pytest --verbose -p pytester -p no:doctest --xdoctest --cov-config ../pyproject.toml --cov-report term --durations=100 --cov="$MOD_NAME" "$MOD_DPATH" ../tests
        echo "pytest command finished, moving the coverage file to the repo root"
        ls -al
        # Move coverage file to a new name
        mv .coverage "../.coverage.$WORKSPACE_DNAME"
        echo "changing directory back to th repo root"
        cd ..
        ls -al
    - name: Combine coverage Linux
      if: runner.os == 'Linux'
      run: |-
        echo '############ PWD'
        pwd
        cp .wheelhouse/.coverage* . || true
        ls -al
        uv pip install coverage[toml] | pip install coverage[toml]
        echo '############ combine'
        coverage combine . || true
        echo '############ XML'
        coverage xml -o ./coverage.xml || true
        echo '### The cwd should now have a coverage.xml'
        ls -altr
        pwd
    - uses: codecov/codecov-action@v5.5.2
      name: Codecov Upload
      with:
        file: ./coverage.xml
        token: ${{ secrets.CODECOV_TOKEN }}


